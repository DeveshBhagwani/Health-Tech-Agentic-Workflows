name: Build and Test ClinicalTelemetryAPI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore ClinicalTelemetryAPI/ClinicalTelemetryAPI.csproj
      
    - name: Build
      run: dotnet build ClinicalTelemetryAPI/ClinicalTelemetryAPI.csproj --no-restore --configuration Release
